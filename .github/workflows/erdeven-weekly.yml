name: Erdeven Weekly CSV Generator

on:
  schedule:
    - cron: '0 11 * * SAT'
  workflow_dispatch:

jobs:
  generate-and-send-csv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 email-validator
      
      - name: Run CSV Generator and Sender
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python erdeven_weekly_csv_sender.py
      
      - name: Notify on failure
        if: failure()
        run: echo "❌ Erreur lors de l'exécution du script"
      
      - name: Notify on success
        if: success()
        run: echo "✅ CSV généré et email envoyé avec succès!"
